services:
  # ── Infrastructure ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: base_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: base_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: base_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic healthcheck --partitions 1 --replication-factor 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ── Migrations ───────────────────────────────────────────
  migrate-todo:
    image: migrate/migrate
    volumes:
      - ./backend/todo/migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://todo_user:todo_pass@postgres:5432/todo_db?sslmode=disable&x-migrations-table=schema_migrations_todo", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  migrate-auth:
    image: migrate/migrate
    volumes:
      - ./backend/auth/migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://todo_user:todo_pass@postgres:5432/todo_db?sslmode=disable&x-migrations-table=schema_migrations_auth", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Notification Service ─────────────────────────────────
  notification-service:
    build:
      context: ./backend/notification
      dockerfile: Dockerfile
    container_name: base_notification
    restart: unless-stopped
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Auth Service ─────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth
      dockerfile: Dockerfile
    container_name: base_auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: postgres://todo_user:todo_pass@postgres:5432/todo_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully

  # ── Todo Service ─────────────────────────────────────────
  todo-service:
    build:
      context: ./backend/todo
      dockerfile: Dockerfile
    container_name: base_todo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://todo_user:todo_pass@postgres:5432/todo_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      migrate-todo:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  # ── Monitoring ───────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: base_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://todo_user:todo_pass@postgres:5432/todo_db?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: base_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: base_kafka_exporter
    restart: unless-stopped
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      kafka:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: base_cadvisor
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    command:
      - '--docker_only=true'
      - '--store_container_labels=false'
      - '--whitelisted_container_labels=com.docker.compose.service'

  prometheus:
    image: prom/prometheus:latest
    container_name: base_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  loki:
    image: grafana/loki:latest
    container_name: base_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: base_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: base_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
        VITE_AUTH_URL: http://localhost:8081
    container_name: base_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - todo-service
      - auth-service

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  loki_data: