services:
  postgres:
    image: postgres:16-alpine
    container_name: base_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: base_user
      POSTGRES_PASSWORD: base_pass
      POSTGRES_DB: base_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
